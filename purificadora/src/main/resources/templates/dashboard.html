<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Purificadora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <div th:insert="fragments/csrf_fragment :: csrfMeta"></div>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
<div class="mx-auto max-w-5xl px-6 py-12">
    <div class="rounded-3xl bg-white p-10 shadow-xl shadow-slate-200">
        <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <h1 class="text-3xl font-semibold text-sky-700">Panel de Control</h1>
                <p class="text-slate-500">Bienvenido a la Purificadora de Agua.</p>
            </div>
            <a href="/logout"
               class="inline-flex items-center rounded-2xl bg-slate-100 px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-200">Cerrar sesión</a>
        </div>
        <div class="mt-10 grid gap-6 sm:grid-cols-2">
            <div class="rounded-3xl border border-slate-200 bg-sky-50 p-8">
                <h2 class="text-xl font-semibold text-slate-800">Usuario</h2>
                <p class="mt-3 text-slate-600">Correo autenticado:</p>
                <p class="mt-2 text-slate-900 font-semibold" th:text="${correo}"></p>
            </div>
            <div class="rounded-3xl border border-slate-200 bg-slate-50 p-8">
                <h2 class="text-xl font-semibold text-slate-800">Estado</h2>
                <p class="mt-3 text-slate-600">Acceso al dashboard completo.</p>
                <p class="mt-2 text-slate-900">Aquí puedes expandir los módulos de clientes, ventas e inventario.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
