<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ventas | Nueva Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <th:block th:insert="~{fragments/csrf_fragment :: csrfMeta}" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
<div class="min-h-screen">
    <div class="grid min-h-screen lg:grid-cols-[280px_1fr]">
        <div th:insert="~{fragments/sidebar_fragment :: sidebarMenu}"></div>
        <div class="mx-auto w-full px-4 py-8 sm:px-6 lg:px-8">
            <div class="rounded-3xl bg-white p-6 shadow-xl shadow-slate-200">
                <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <h1 class="text-3xl font-semibold text-sky-700">Nueva Venta</h1>
                        <p class="text-sm text-slate-500">Registra una venta en mostrador o entrega a domicilio.</p>
                    </div>
                    <a href="/ventas/historial" class="inline-flex items-center justify-center rounded-2xl bg-slate-800 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-900">Historial de ventas</a>
                </div>

                <form id="ventaForm" th:action="@{/ventas/guardar}" method="post" class="grid gap-6">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="grid gap-6 lg:grid-cols-3">
                        <div>
                            <label class="mb-2 block text-sm font-medium text-slate-700">Tipo de venta</label>
                            <select name="tipoVenta" required
                                    class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100">
                                <option value="" disabled selected>Selecciona tipo</option>
                                <option th:each="tipo : ${tiposVenta}" th:value="${tipo}" th:text="${tipo}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="mb-2 block text-sm font-medium text-slate-700">Método de pago</label>
                            <select name="metodoPago" required
                                    class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100">
                                <option value="" disabled selected>Selecciona pago</option>
                                <option th:each="metodo : ${metodosPago}" th:value="${metodo}" th:text="${metodo}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="mb-2 block text-sm font-medium text-slate-700">Cliente</label>
                            <select name="clienteId"
                                    class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100">
                                <option value="" selected>Público General</option>
                                <option th:each="cliente : ${clientes}" th:value="${cliente.idCliente}" th:text="${cliente.nombre}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="grid gap-6 lg:grid-cols-[2fr_1fr_1fr_1fr]">
                        <div>
                            <label class="mb-2 block text-sm font-medium text-slate-700">Producto</label>
                            <select id="productoSelect" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100">
                                <option value="" selected>Selecciona producto</option>
                                <option th:each="producto : ${productos}" th:value="${producto.idProducto}" th:data-precio="${producto.precioVenta}" th:text="${producto.nombre} + ' - ' + ${producto.categoria.nombre}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="mb-2 block text-sm font-medium text-slate-700">Precio unitario</label>
                            <input id="precioUnitario" type="number" min="0" step="0.01" readonly
                                   class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none" />
                        </div>
                        <div>
                            <label class="mb-2 block text-sm font-medium text-slate-700">Cantidad</label>
                            <input id="cantidadProducto" type="number" min="1" value="1"
                                   class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" />
                        </div>
                        <div>
                            <label class="mb-2 block text-sm font-medium text-slate-700">Subtotal</label>
                            <input id="subtotalProducto" type="text" readonly
                                   class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none" />
                        </div>
                    </div>

                    <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
                        <button type="button" id="agregarProductoBtn" class="inline-flex items-center justify-center rounded-2xl bg-sky-600 px-6 py-3 text-sm font-semibold text-white transition hover:bg-sky-700">Añadir al carrito</button>
                        <div class="rounded-3xl bg-slate-50 p-4 text-slate-700 shadow-inner shadow-slate-100">
                            <p class="text-sm text-slate-500">Total general</p>
                            <p class="text-3xl font-semibold text-slate-900" id="totalGeneral">0.00</p>
                        </div>
                    </div>

                    <div class="overflow-x-auto rounded-3xl border border-slate-200 bg-slate-50">
                        <table class="min-w-full divide-y divide-slate-200 text-left text-sm">
                            <thead class="bg-slate-100 text-slate-700">
                            <tr>
                                <th class="px-4 py-3">Producto</th>
                                <th class="px-4 py-3">Cantidad</th>
                                <th class="px-4 py-3">Precio unitario</th>
                                <th class="px-4 py-3">Subtotal</th>
                                <th class="px-4 py-3">Acciones</th>
                            </tr>
                            </thead>
                            <tbody id="cartBody" class="divide-y divide-slate-200 bg-white"></tbody>
                        </table>
                    </div>

                    <div class="grid gap-4 lg:grid-cols-[1fr_1fr]">
                        <button type="submit" class="inline-flex items-center justify-center rounded-2xl bg-sky-600 px-6 py-4 text-sm font-semibold text-white transition hover:bg-sky-700">Guardar venta</button>
                        <button type="button" id="limpiarCarritoBtn" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white px-6 py-4 text-sm font-semibold text-slate-900 transition hover:bg-slate-100">Limpiar carrito</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const productos = Array.from(document.querySelectorAll('#productoSelect option'))
        .filter(option => option.value !== '');

    const precioUnitarioInput = document.getElementById('precioUnitario');
    const cantidadInput = document.getElementById('cantidadProducto');
    const subtotalInput = document.getElementById('subtotalProducto');
    const productoSelect = document.getElementById('productoSelect');
    const agregarBtn = document.getElementById('agregarProductoBtn');
    const cartBody = document.getElementById('cartBody');
    const totalGeneral = document.getElementById('totalGeneral');
    const limpiarCarritoBtn = document.getElementById('limpiarCarritoBtn');
    const ventaForm = document.getElementById('ventaForm');

    let cartItems = [];

    function actualizarSubtotal() {
        const precio = parseFloat(precioUnitarioInput.value) || 0;
        const cantidad = parseInt(cantidadInput.value) || 0;
        subtotalInput.value = (precio * cantidad).toFixed(2);
    }

    function actualizarTotal() {
        const total = cartItems.reduce((sum, item) => sum + parseFloat(item.subtotal), 0);
        totalGeneral.textContent = total.toFixed(2);
    }

    function renderCart() {
        cartBody.innerHTML = '';
        cartItems.forEach((item, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="px-4 py-3 text-slate-800">${item.nombre}</td>
                <td class="px-4 py-3 text-slate-800">${item.cantidad}</td>
                <td class="px-4 py-3 text-slate-800">${parseFloat(item.precioUnitario).toFixed(2)}</td>
                <td class="px-4 py-3 text-slate-800">${parseFloat(item.subtotal).toFixed(2)}</td>
                <td class="px-4 py-3">
                    <button type="button" data-index="${index}" class="remove-item inline-flex rounded-2xl bg-rose-600 px-3 py-2 text-xs font-semibold text-white hover:bg-rose-700">Eliminar</button>
                </td>
            `;
            cartBody.appendChild(row);
        });
        actualizarTotal();
        attachRemoveButtons();
    }

    function attachRemoveButtons() {
        document.querySelectorAll('.remove-item').forEach(button => {
            button.addEventListener('click', function () {
                const index = parseInt(this.dataset.index, 10);
                cartItems.splice(index, 1);
                renderCart();
            });
        });
    }

    productoSelect.addEventListener('change', () => {
        const selected = productoSelect.selectedOptions[0];
        const precio = parseFloat(selected.dataset.precio || 0);
        precioUnitarioInput.value = precio.toFixed(2);
        actualizarSubtotal();
    });

    cantidadInput.addEventListener('input', actualizarSubtotal);

    agregarBtn.addEventListener('click', () => {
        const selected = productoSelect.selectedOptions[0];
        if (!selected || !selected.value) return;

        const item = {
            productoId: selected.value,
            nombre: selected.textContent,
            cantidad: parseInt(cantidadInput.value, 10) || 0,
            precioUnitario: parseFloat(precioUnitarioInput.value) || 0,
            subtotal: parseFloat(subtotalInput.value) || 0
        };

        if (item.cantidad <= 0 || item.precioUnitario <= 0) return;

        cartItems.push(item);
        renderCart();
    });

    limpiarCarritoBtn.addEventListener('click', () => {
        cartItems = [];
        renderCart();
    });

    ventaForm.addEventListener('submit', function (event) {
        cartBody.querySelectorAll('tr').forEach((row, index) => row.remove());
        const existingInputs = document.querySelectorAll('.cart-input');
        existingInputs.forEach(input => input.remove());

        cartItems.forEach(item => {
            const productoInput = document.createElement('input');
            productoInput.type = 'hidden';
            productoInput.name = 'productoId';
            productoInput.value = item.productoId;
            productoInput.classList.add('cart-input');

            const cantidadInput = document.createElement('input');
            cantidadInput.type = 'hidden';
            cantidadInput.name = 'cantidad';
            cantidadInput.value = item.cantidad;
            cantidadInput.classList.add('cart-input');

            const precioInput = document.createElement('input');
            precioInput.type = 'hidden';
            precioInput.name = 'precioUnitario';
            precioInput.value = item.precioUnitario;
            precioInput.classList.add('cart-input');

            const subtotalInput = document.createElement('input');
            subtotalInput.type = 'hidden';
            subtotalInput.name = 'subtotal';
            subtotalInput.value = item.subtotal;
            subtotalInput.classList.add('cart-input');

            ventaForm.appendChild(productoInput);
            ventaForm.appendChild(cantidadInput);
            ventaForm.appendChild(precioInput);
            ventaForm.appendChild(subtotalInput);
        });

        if (cartItems.length === 0) {
            event.preventDefault();
            alert('Agrega al menos un producto al carrito antes de guardar la venta.');
        }
    });
</script>
</body>
</html>
