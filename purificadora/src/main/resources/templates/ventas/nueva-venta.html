<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ventas | Nueva Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <th:block th:replace="~{fragments/csrf_fragment :: csrfMeta}"></th:block>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 via-indigo-50 to-purple-200 text-slate-700">

<div class="min-h-screen p-4 sm:p-6 lg:p-8">
    <div class="app-shell grid min-h-[calc(100vh-2rem)] gap-10 lg:gap-14 sm:min-h-[calc(100vh-3rem)] lg:min-h-[calc(100vh-4rem)]">

        <!-- Sidebar (fragmento externo, sin tocar su lógica) -->
        <div th:insert="~{fragments/sidebar_fragment :: sidebarMenu}"></div>

        <div class="mx-auto w-full">

            <!-- ===================== TARJETA PRINCIPAL ===================== -->
            <div class="rounded-[2.5rem] bg-purple-50/90 backdrop-blur p-6 sm:p-10 clay-card">

                <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
                    <div class="flex items-center gap-4">
                        <div class="hidden sm:flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 clay-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-extrabold text-indigo-900">Nueva Venta</h1>
                            <p class="text-sm font-medium text-indigo-400/80">Registra una venta en mostrador o entrega a domicilio.</p>
                        </div>
                    </div>
                    <a th:href="@{/ventas/historial}"
                       class="inline-flex items-center justify-center gap-2 rounded-full bg-white px-5 py-3 text-sm font-bold text-indigo-500 transition clay-btn-soft">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/>
                        </svg>
                        Historial de ventas
                    </a>
                </div>

                <form id="ventaForm" th:action="@{/ventas/guardar}" method="post" class="mt-8 grid gap-6">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <!-- ===================== DATOS DE LA VENTA ===================== -->
                    <div class="rounded-[2rem] bg-white p-6 sm:p-8 clay-card-sm">
                        <div class="grid gap-6 lg:grid-cols-3">
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Tipo de venta</label>
                                <select name="tipoVenta" required
                                        class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input">
                                    <option value="" disabled selected>Selecciona tipo</option>
                                    <option th:each="tipo : ${tiposVenta}" th:value="${tipo}" th:text="${tipo}"></option>
                                </select>
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Método de pago</label>
                                <select name="metodoPago" required
                                        class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input">
                                    <option value="" disabled selected>Selecciona pago</option>
                                    <option th:each="metodo : ${metodosPago}" th:value="${metodo}" th:text="${metodo}"></option>
                                </select>
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Cliente</label>
                                <select name="clienteId"
                                        class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input">
                                    <option value="" selected>Público General</option>
                                    <option th:each="cliente : ${clientes}" th:value="${cliente.idCliente}" th:text="${cliente.nombre}"></option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- ===================== AGREGAR PRODUCTO ===================== -->
                    <div class="rounded-[2rem] bg-white p-6 sm:p-8 clay-card-sm">
                        <div class="flex items-center gap-3">
                            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-rose-100 clay-chip">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-rose-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                                </svg>
                            </div>
                            <h2 class="text-lg font-bold text-indigo-900">Agregar producto</h2>
                        </div>

                        <div class="mt-6 grid gap-6 lg:grid-cols-[2fr_1fr_1fr_1fr]">
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Producto</label>
                                <select id="productoSelect"
                                        class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input">
                                    <option value="" selected>Selecciona producto</option>
                                    <option th:each="producto : ${productos}" th:value="${producto.idProducto}" th:data-precio="${producto.precioVenta}" th:text="${producto.nombre} + ' - ' + ${producto.categoria.nombre}"></option>
                                </select>
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Precio unitario</label>
                                <input id="precioUnitario" type="number" min="0" step="0.01" readonly
                                       class="w-full rounded-2xl border-0 bg-purple-50/40 px-4 py-3 text-slate-500 outline-none clay-input-readonly" />
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Cantidad</label>
                                <input id="cantidadProducto" type="number" min="1" value="1"
                                       class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" />
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Subtotal</label>
                                <input id="subtotalProducto" type="text" readonly
                                       class="w-full rounded-2xl border-0 bg-purple-50/40 px-4 py-3 text-slate-500 outline-none clay-input-readonly" />
                            </div>
                        </div>

                        <div class="mt-6 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
                            <button type="button" id="agregarProductoBtn"
                                    class="inline-flex items-center justify-center gap-2 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 px-6 py-3 text-sm font-bold text-white transition clay-btn">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                                </svg>
                                Añadir al carrito
                            </button>
                            <div class="rounded-[1.5rem] bg-purple-50/60 p-5 clay-panel-inset">
                                <p class="text-sm font-medium text-indigo-400/80">Total general</p>
                                <p class="text-3xl font-extrabold text-indigo-900" id="totalGeneral">0.00</p>
                            </div>
                        </div>
                    </div>

                    <!-- ===================== CARRITO ===================== -->
                    <div class="overflow-x-auto rounded-[2rem] bg-white p-2 sm:p-3 clay-card-sm">
                        <table class="min-w-full border-separate text-left text-sm border-spaced-table">
                            <thead>
                            <tr class="text-xs font-bold uppercase tracking-wide text-indigo-400/80">
                                <th class="px-4 py-3">Producto</th>
                                <th class="px-4 py-3">Cantidad</th>
                                <th class="px-4 py-3">Precio unitario</th>
                                <th class="px-4 py-3">Subtotal</th>
                                <th class="px-4 py-3">Acciones</th>
                            </tr>
                            </thead>
                            <tbody id="cartBody"></tbody>
                        </table>
                    </div>

                    <div class="grid gap-4 lg:grid-cols-[1fr_1fr]">
                        <button type="submit"
                                class="inline-flex items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 px-6 py-4 text-sm font-bold text-white transition clay-btn">Guardar venta</button>
                        <button type="button" id="limpiarCarritoBtn"
                                class="inline-flex items-center justify-center rounded-full bg-purple-50 px-6 py-4 text-sm font-bold text-indigo-500 transition clay-btn-soft">Limpiar carrito</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/ventas-nueva.js}"></script>
</body>
</html>
