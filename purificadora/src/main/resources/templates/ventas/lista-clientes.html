<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ventas | Clientes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <th:block th:replace="~{fragments/csrf_fragment :: csrfMeta}"></th:block>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 via-indigo-50 to-purple-200 text-slate-700">

<div class="min-h-screen p-4 sm:p-6 lg:p-8">
    <div class="app-shell grid min-h-[calc(100vh-2rem)] gap-10 lg:gap-14 sm:min-h-[calc(100vh-3rem)] lg:min-h-[calc(100vh-4rem)]">

        <!-- Sidebar (fragmento externo, sin tocar su lógica) -->
        <div th:insert="~{fragments/sidebar_fragment :: sidebarMenu}"></div>

        <div class="mx-auto w-full">

            <!-- ===================== TARJETA PRINCIPAL ===================== -->
            <div class="rounded-[2.5rem] bg-purple-50/90 backdrop-blur p-6 sm:p-10 clay-card">

                <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
                    <div class="flex items-center gap-4">
                        <div class="hidden sm:flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 clay-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-extrabold text-indigo-900">Clientes</h1>
                            <p class="text-sm font-medium text-indigo-400/80">Administra los clientes para ventas y entregas.</p>
                        </div>
                    </div>
                    <a th:href="@{/ventas/nueva}"
                       class="inline-flex items-center justify-center gap-2 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 px-5 py-3 text-sm font-bold text-white transition clay-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Nueva Venta
                    </a>
                </div>

                <div class="mt-8 grid gap-6 lg:grid-cols-[2fr_1fr]">

                    <!-- ===================== LISTA DE CLIENTES ===================== -->
                    <div class="rounded-[2rem] bg-white p-5 sm:p-6 clay-card-sm">
                        <div class="flex items-center gap-3">
                            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-sky-100 clay-chip">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-sky-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                            <h2 class="text-lg font-bold text-indigo-900">Lista de clientes</h2>
                        </div>

                        <div class="mt-5 overflow-x-auto rounded-[1.5rem] bg-purple-50/40 p-2 sm:p-3">
                            <table class="min-w-full border-separate text-left text-sm border-spaced-table">
                                <thead>
                                <tr class="text-xs font-bold uppercase tracking-wide text-indigo-400/80">
                                    <th class="px-4 py-3">Nombre</th>
                                    <th class="px-4 py-3">Teléfono</th>
                                    <th class="px-4 py-3">Dirección</th>
                                    <th class="px-4 py-3">Saldo envases</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="cliente : ${clientes}" class="rounded-2xl bg-white clay-row">
                                    <td class="rounded-l-2xl px-4 py-4 font-bold text-indigo-900" th:text="${cliente.nombre}"></td>
                                    <td class="px-4 py-4 font-medium text-slate-700" th:text="${cliente.telefono}"></td>
                                    <td class="px-4 py-4 font-medium text-slate-700" th:text="${cliente.direccion}"></td>
                                    <td class="rounded-r-2xl px-4 py-4">
                                        <span class="inline-flex items-center rounded-full bg-emerald-100 px-3 py-1.5 text-xs font-bold text-emerald-700 clay-chip" th:text="${cliente.saldoEnvases}"></span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(clientes)}">
                                    <td class="rounded-2xl px-4 py-10 text-center font-semibold text-indigo-400/80 clay-panel-inset" colspan="4">No se encontraron clientes.</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- ===================== AGREGAR CLIENTE ===================== -->
                    <div class="rounded-[2rem] bg-white p-5 sm:p-6 clay-card-sm">
                        <div class="flex items-center gap-3">
                            <div class="flex h-10 w-10 items-center justify-center rounded-full bg-purple-100 clay-chip">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="17" y1="11" x2="23" y2="11"/>
                                </svg>
                            </div>
                            <h2 class="text-lg font-bold text-indigo-900">Agregar cliente</h2>
                        </div>

                        <form th:action="@{/ventas/clientes}" th:object="${cliente}" method="post" class="mt-5 space-y-4">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Nombre</label>
                                <input type="text" th:field="*{nombre}" required
                                       class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" />
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Teléfono</label>
                                <input type="text" th:field="*{telefono}"
                                       class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" />
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Dirección</label>
                                <input type="text" th:field="*{direccion}"
                                       class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" />
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Referencias</label>
                                <textarea th:field="*{referenciasDireccion}"
                                          class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" rows="3"></textarea>
                            </div>
                            <button type="submit"
                                    class="inline-flex w-full items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 px-4 py-3 text-sm font-bold text-white transition clay-btn">Guardar cliente</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
