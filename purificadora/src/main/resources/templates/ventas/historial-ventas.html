<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ventas | Historial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <th:block th:insert="~{fragments/csrf_fragment :: csrfMeta}" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
<div class="min-h-screen">
    <div class="grid min-h-screen lg:grid-cols-[280px_1fr]">
        <div th:insert="~{fragments/sidebar_fragment :: sidebarMenu}"></div>
        <div class="mx-auto w-full px-4 py-8 sm:px-6 lg:px-8">
            <div class="rounded-3xl bg-white p-6 shadow-xl shadow-slate-200">
                <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <div>
                        <h1 class="text-3xl font-semibold text-sky-700">Historial de Ventas</h1>
                        <p class="text-sm text-slate-500">Revisa las ventas registradas y consulta sus detalles.</p>
                    </div>
                    <a href="/ventas/nueva" class="inline-flex items-center justify-center rounded-2xl bg-slate-800 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-900">Nueva venta</a>
                </div>

                <div class="grid gap-4 lg:grid-cols-[1fr_1fr_1fr] mb-6">
                    <div>
                        <label class="mb-2 block text-sm font-medium text-slate-700">Tipo de venta</label>
                        <form th:action="@{/ventas/historial}" method="get" class="space-y-3">
                            <select name="tipoVenta"
                                    class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100">
                                <option value="">Todos</option>
                                <option th:each="tipo : ${tiposVenta}" th:value="${tipo}" th:text="${tipo}"></option>
                            </select>
                            <button type="submit" class="inline-flex w-full items-center justify-center rounded-2xl bg-sky-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-sky-700">Filtrar</button>
                        </form>
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-medium text-slate-700">Desde</label>
                        <input type="date" name="desde"
                               class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" />
                    </div>
                    <div>
                        <label class="mb-2 block text-sm font-medium text-slate-700">Hasta</label>
                        <input type="date" name="hasta"
                               class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100" />
                    </div>
                </div>

                <div class="overflow-x-auto rounded-3xl border border-slate-200 bg-slate-50">
                    <table class="min-w-full divide-y divide-slate-200 text-left text-sm">
                        <thead class="bg-slate-100 text-slate-700">
                        <tr>
                            <th class="px-4 py-3 font-medium">Fecha</th>
                            <th class="px-4 py-3 font-medium">Cliente</th>
                            <th class="px-4 py-3 font-medium">Tipo</th>
                            <th class="px-4 py-3 font-medium">Pago</th>
                            <th class="px-4 py-3 font-medium">Total</th>
                            <th class="px-4 py-3 font-medium">Acciones</th>
                        </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-200 bg-white">
                        <tr th:each="venta : ${ventas}">
                            <td class="px-4 py-4 text-slate-800" th:text="${#temporals.format(venta.fechaVenta, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="px-4 py-4 text-slate-800" th:text="${venta.cliente != null ? venta.cliente.nombre : 'Público General'}"></td>
                            <td class="px-4 py-4 text-slate-800" th:text="${venta.tipoVenta}"></td>
                            <td class="px-4 py-4 text-slate-800" th:text="${venta.metodoPago}"></td>
                            <td class="px-4 py-4 text-slate-800" th:text="${#numbers.formatDecimal(venta.total, 1, 'COMMA', 2, 'POINT')}"></td>
                            <td class="px-4 py-4">
                                <a th:href="@{/ventas/detalle/{id}(id=${venta.idVenta})}"
                                   class="inline-flex rounded-2xl bg-sky-600 px-3 py-2 text-xs font-semibold text-white transition hover:bg-sky-700">Ver detalle</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(ventas)}">
                            <td class="px-4 py-8 text-center text-slate-500" colspan="6">No hay ventas registradas.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
