<aside th:fragment="sidebarMenu" class="hidden shrink-0 overflow-hidden rounded-[2.5rem] bg-gradient-to-b from-indigo-500 to-purple-600 p-6 text-white lg:flex lg:flex-col clay-card-sidebar">

    <!-- ===================== LOGO / MARCA ===================== -->
    <div class="mb-6 flex items-center justify-between gap-3 border-b border-white/15 pb-6 sidebar-header">
        <div class="flex items-center gap-3">
            <img th:src="@{/images/logo.jpg}" src="/images/logo.jpg" alt="Logo Purificadora" class="h-12 w-12 shrink-0 rounded-2xl object-cover" />
            <div class="sidebar-text">
                <p class="text-[11px] font-bold uppercase tracking-[0.2em] text-indigo-200">Purificadora</p>
                <h2 class="text-lg font-extrabold text-white">Inventario</h2>
            </div>
        </div>
        <div class="flex items-center gap-2 sidebar-text">
            <button id="themeToggleBtn" type="button" class="inline-flex items-center justify-center gap-1.5 rounded-full bg-white/15 px-3 py-2 text-xs font-semibold text-white transition hover:bg-white/25">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <span id="themeToggleLabel">Modo oscuro</span>
            </button>
        </div>
    </div>

    <!-- ===================== BOTÓN COLAPSAR (siempre visible) ===================== -->
    <button id="sidebarToggleBtn" type="button" aria-expanded="true" title="Colapsar menú"
            class="mb-4 inline-flex items-center justify-center gap-2 self-end rounded-full bg-white/10 px-3 py-2 text-xs font-semibold text-white transition hover:bg-white/20">
        <svg xmlns="http://www.w3.org/2000/svg" id="sidebarToggleIcon" class="h-4 w-4 shrink-0 transition-transform duration-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span class="sidebar-text">Colapsar</span>
    </button>

    <!-- ===================== NAVEGACIÓN ===================== -->
    <nav class="sidebar-nav space-y-2 overflow-x-hidden pr-2">
        <a th:href="@{/dashboard}" title="Dashboard"
           th:classappend="${activePath == '/dashboard'} ? ' active-sidebar-link' : ''"
           class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white sidebar-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/>
            </svg>
            <span class="link-label">Dashboard</span>
        </a>
        <a th:href="@{/inventario/productos}" title="Productos"
           th:classappend="${activePath.startsWith('/inventario/productos')} ? ' active-sidebar-link' : ''"
           class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white sidebar-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="M3.3 7 12 12l8.7-5"/><path d="M12 22V12"/>
            </svg>
            <span class="link-label">Productos</span>
        </a>
        <a th:href="@{/inventario/formulario-productos}" title="Nuevo Producto"
           th:classappend="${activePath == '/inventario/formulario-productos' or activePath.startsWith('/inventario/productos/nuevo')} ? ' active-sidebar-link' : ''"
           class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white sidebar-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span class="link-label">Nuevo Producto</span>
        </a>
        <a th:href="@{/inventario/productos/criticos}" title="Stock Crítico"
           th:classappend="${activePath == '/inventario/productos/criticos'} ? ' active-sidebar-link' : ''"
           class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white sidebar-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <span class="link-label">Stock Crítico</span>
        </a>
        <a th:href="@{/inventario/categorias}" title="Categorías"
           th:classappend="${activePath.startsWith('/inventario/categorias')} ? ' active-sidebar-link' : ''"
           class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white sidebar-link">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>
            </svg>
            <span class="link-label">Categorías</span>
        </a>

        <div class="border-t border-white/15 pt-4 sidebar-section">
            <p class="px-4 pb-2 text-[11px] font-bold uppercase tracking-[0.24em] text-indigo-200 sidebar-text">Ventas</p>
            <a th:href="@{/ventas/nueva}" title="Nueva Venta"
               th:classappend="${activePath == '/ventas/nueva'} ? ' active-sidebar-link' : ''"
               class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white sidebar-link">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                <span class="link-label">Nueva Venta</span>
            </a>
            <a th:href="@{/ventas/historial}" title="Historial de Ventas"
               th:classappend="${activePath.startsWith('/ventas/historial')} ? ' active-sidebar-link' : ''"
               class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white sidebar-link">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
                </svg>
                <span class="link-label">Historial de Ventas</span>
            </a>
            <a th:href="@{/ventas/clientes}" title="Clientes"
               th:classappend="${activePath.startsWith('/ventas/clientes')} ? ' active-sidebar-link' : ''"
               class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white sidebar-link">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span class="link-label">Clientes</span>
            </a>
        </div>

        <div class="border-t border-white/15 pt-4 sidebar-section">
            <p class="px-4 pb-2 text-[11px] font-bold uppercase tracking-[0.24em] text-indigo-200 sidebar-text">Mantenimiento</p>
            <a th:href="@{/mantenimiento}" title="Historial de Mantenimientos"
               th:classappend="${activePath == '/mantenimiento'} ? ' active-sidebar-link' : ''"
               class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white sidebar-link">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span class="link-label">Historial de Mantenimientos</span>
            </a>
            <a th:href="@{/mantenimiento/nuevo}" title="Registrar Mantenimiento"
               th:classappend="${activePath.startsWith('/mantenimiento/nuevo')} ? ' active-sidebar-link' : ''"
               class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white sidebar-link">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                <span class="link-label">Registrar Mantenimiento</span>
            </a>
        </div>
    </nav>

    <!-- ===================== CERRAR SESIÓN ===================== -->
    <a th:href="@{/logout}" title="Cerrar sesión"
        class="mt-auto inline-flex w-full items-center justify-center gap-2 rounded-full bg-white px-4 py-3.5 text-sm font-bold text-indigo-600 transition clay-btn-light">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="link-label">Cerrar sesión</span>
    </a>
</aside>
