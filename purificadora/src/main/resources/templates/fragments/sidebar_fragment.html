<aside th:fragment="sidebarMenu" class="hidden min-h-screen shrink-0 rounded-[2.5rem] bg-gradient-to-b from-indigo-500 to-purple-600 p-6 text-white lg:flex lg:w-80 lg:flex-col clay-card-sidebar"
       style="font-family: 'Urbanist', sans-serif;">

    <!-- ===================== LOGO / MARCA ===================== -->
    <div class="flex items-center gap-3 border-b border-white/15 pb-6">
        <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white/95 text-xl font-extrabold text-indigo-600 clay-chip-dark">P</div>
        <div>
            <p class="text-[11px] font-bold uppercase tracking-[0.2em] text-indigo-200">Purificadora</p>
            <h2 class="text-lg font-extrabold text-white">Inventario</h2>
        </div>
    </div>

    <!-- ===================== NAVEGACIÓN ===================== -->
    <nav class="mt-8 flex-1 space-y-2">
        <a th:href="@{/dashboard}"
           class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/>
            </svg>
            Dashboard
        </a>
        <a th:href="@{/inventario/productos}"
           class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="M3.3 7 12 12l8.7-5"/><path d="M12 22V12"/>
            </svg>
            Productos
        </a>
        <a th:href="@{/inventario/formulario-productos}"
           class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Nuevo Producto
        </a>
        <a th:href="@{/inventario/productos/criticos}"
           class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            Stock Crítico
        </a>
        <a th:href="@{/inventario/categorias}"
           class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>
            </svg>
            Categorías
        </a>

        <div class="border-t border-white/15 pt-4 mt-4">
            <p class="px-4 pb-2 text-[11px] font-bold uppercase tracking-[0.24em] text-indigo-200">Ventas</p>
            <a th:href="@{/ventas/nueva}"
               class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
                Nueva Venta
            </a>
            <a th:href="@{/ventas/historial}"
               class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
                </svg>
                Historial de Ventas
            </a>
            <a th:href="@{/ventas/clientes}"
               class="flex items-center gap-3 rounded-full px-4 py-3 text-sm font-semibold text-indigo-100 transition hover:bg-white/10 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Clientes
            </a>
        </div>
    </nav>

    <!-- ===================== ACCIONES RÁPIDAS ===================== -->
    <div class="mt-6 rounded-[1.75rem] bg-white/10 p-5 text-sm text-indigo-100 clay-panel-inset-dark">
        <p class="flex items-center gap-2 font-bold text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
            Acciones rápidas
        </p>
        <p class="mt-3 text-xs leading-relaxed text-indigo-200">Usa el menú para moverte entre inventario, productos y categorías.</p>
    </div>

    <!-- ===================== CERRAR SESIÓN ===================== -->
    <a th:href="@{/logout}"
       class="mt-6 inline-flex w-full items-center justify-center gap-2 rounded-full bg-white px-4 py-3.5 text-sm font-bold text-indigo-600 transition clay-btn-light">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Cerrar sesión
    </a>
</aside>
