<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Purificadora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/auth.css}" />
    <th:block th:replace="~{fragments/csrf_fragment :: csrfMeta}"></th:block>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 via-indigo-50 to-purple-200 text-slate-700">

<div class="flex min-h-screen items-stretch justify-center">

    <!-- ===================== LADO IZQUIERDO (solo desktop) ===================== -->
    <div class="hidden lg:flex lg:w-1/2 items-center justify-center relative overflow-hidden bg-gradient-to-br from-purple-200 via-indigo-100 to-purple-300">

        <!-- blobs decorativos de arcilla -->
        <div class="absolute -top-10 -left-10 w-72 h-72 rounded-full bg-white/40 clay-chip"></div>
        <div class="absolute bottom-10 right-0 w-56 h-56 rounded-full bg-purple-300/50 clay-chip"></div>
        <div class="absolute top-1/3 right-10 w-24 h-24 rounded-3xl bg-pink-200/60 rotate-12 clay-chip"></div>

        <div class="relative z-10 max-w-md px-10 text-center">
            <div class="mx-auto mb-8 flex h-28 w-28 items-center justify-center rounded-[2rem] bg-gradient-to-br from-indigo-500 to-purple-600 clay-btn">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.32 0z"/>
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold text-indigo-900 leading-tight">Agua pura,<br/>vida ligera</h1>
            <p class="mt-4 text-base font-medium text-indigo-500/80">
                Administra tus pedidos, entregas y suscripciones de Purificadora desde un solo lugar.
            </p>

            <div class="mt-10 flex justify-center gap-4">
                <div class="h-16 w-16 rounded-2xl bg-emerald-200/70 clay-chip flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-emerald-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20"/></svg>
                </div>
                <div class="h-16 w-16 rounded-2xl bg-rose-200/70 clay-chip flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-rose-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12H4M4 12l6-6M4 12l6 6"/></svg>
                </div>
                <div class="h-16 w-16 rounded-2xl bg-sky-200/70 clay-chip flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-sky-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
                </div>
            </div>
        </div>
    </div>

    <!-- ===================== LADO DERECHO / TARJETA LOGIN ===================== -->
    <div class="flex w-full lg:w-1/2 items-center justify-center px-4 py-8 sm:px-6 lg:px-10">

        <div class="w-full max-w-sm sm:max-w-md rounded-[2.5rem] bg-purple-50/90 backdrop-blur p-6 sm:p-10 clay-card">

            <!-- Avatar / icono superior -->
            <div class="mx-auto -mt-16 sm:-mt-20 mb-6 flex h-20 w-20 sm:h-24 sm:w-24 items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 clay-btn">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 sm:h-12 sm:w-12 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>

            <div class="space-y-1 text-center mb-8">
                <h1 class="text-2xl sm:text-3xl font-extrabold text-indigo-900">Iniciar Sesión</h1>
                <p class="text-sm font-medium text-indigo-400/80">Bienvenido de nuevo a Purificadora</p>
            </div>

            <!-- Mensajes de estado -->
            <div th:if="${error}" class="mb-5 rounded-2xl bg-rose-100/80 p-4 text-rose-600 font-medium clay-alert">
                <p th:text="${error}"></p>
            </div>
            <div th:if="${success}" class="mb-5 rounded-2xl bg-emerald-100/80 p-4 text-emerald-600 font-medium clay-alert">
                <p th:text="${success}"></p>
            </div>

            <form class="space-y-6" th:action="@{/login}" method="post">
                <div th:if="${_csrf != null}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </div>

                <!-- Contenedor "hundido" que agrupa los inputs -->
                <div class="rounded-[2rem] bg-purple-50 p-5 sm:p-6 clay-panel-inset space-y-5">

                    <div>
                        <label class="mb-2 ml-2 block text-xs font-bold uppercase tracking-wide text-indigo-400">Correo</label>
                        <div class="flex items-center gap-3 rounded-full bg-white px-5 py-3.5 clay-input transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 text-indigo-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/>
                            </svg>
                            <input name="username" type="email" required
                                   class="w-full bg-transparent text-sm font-medium text-indigo-900 placeholder-indigo-300 outline-none"
                                   placeholder="correo@ejemplo.com">
                        </div>
                    </div>

                    <div>
                        <label class="mb-2 ml-2 block text-xs font-bold uppercase tracking-wide text-indigo-400">Contraseña</label>
                        <div class="flex items-center gap-3 rounded-full bg-white px-5 py-3.5 clay-input transition">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 text-indigo-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input name="password" type="password" required
                                   class="w-full bg-transparent text-sm font-medium text-indigo-900 placeholder-indigo-300 outline-none"
                                   placeholder="Tu contraseña">
                        </div>
                    </div>
                </div>

                <div class="flex justify-end pr-2 -mt-2">
                    <a href="/recuperar" class="text-xs font-semibold text-indigo-400 hover:text-indigo-600 transition">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit"
                        class="w-full rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 px-4 py-4 text-sm font-bold uppercase tracking-wide text-white transition clay-btn">
                    Ingresar
                </button>

                <p class="text-center text-sm font-medium text-indigo-400/80">
                    ¿No tienes cuenta?
                    <a href="/registro" class="font-bold text-purple-600 hover:text-purple-700 transition">Regístrate</a>
                </p>
            </form>
        </div>
    </div>
</div>
</body>
</html>
