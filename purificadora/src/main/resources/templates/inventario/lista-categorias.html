<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario | Categorías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <th:block th:insert="~{fragments/csrf_fragment :: csrfMeta}" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
<div class="min-h-screen">
    <div class="grid min-h-screen lg:grid-cols-[280px_1fr]">
        <div th:insert="~{fragments/sidebar_fragment :: sidebarMenu}"></div>
        <div class="mx-auto w-full px-4 py-8 sm:px-6 lg:px-8">
            <div class="grid gap-6 lg:grid-cols-[360px_1fr]">
        <div class="rounded-3xl bg-white p-6 shadow-xl shadow-slate-200">
            <div class="mb-6">
                <h1 class="text-2xl font-semibold text-sky-700">Nueva Categoría</h1>
                <p class="mt-2 text-sm text-slate-500">Agrega una categoría para clasificar tus productos.</p>
            </div>
            <form th:action="@{/inventario/categorias}" method="post" th:object="${categoria}" class="grid gap-5">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div>
                    <label class="mb-2 block text-sm font-medium text-slate-700">Nombre</label>
                    <input th:field="*{nombre}" type="text" placeholder="Producto Terminado"
                           class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-100" />
                    <p th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="mt-1 text-sm text-rose-600"></p>
                </div>
                <div>
                    <label class="mb-2 block text-sm font-medium text-slate-700">Descripción</label>
                    <textarea th:field="*{descripcion}" rows="4" placeholder="Descripción de la categoría"
                              class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none transition focus:border-sky-400 focus:ring-2 focus:ring-sky-100"></textarea>
                    <p th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}" class="mt-1 text-sm text-rose-600"></p>
                </div>
                <button type="submit" class="inline-flex items-center justify-center rounded-2xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-sky-700">Guardar categoría</button>
            </form>
        </div>

        <div class="rounded-3xl bg-white p-6 shadow-xl shadow-slate-200">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div>
                    <h2 class="text-2xl font-semibold text-slate-900">Categorías existentes</h2>
                    <p class="text-sm text-slate-500">Edita y elimina categorías cuando sea necesario.</p>
                </div>
                <a href="/inventario/productos" class="inline-flex items-center justify-center rounded-2xl bg-slate-800 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-900">Volver a productos</a>
            </div>

            <div th:if="${success}" class="mt-6 rounded-3xl border border-emerald-200 bg-emerald-50 p-4 text-emerald-700">
                <p th:text="${success}"></p>
            </div>
            <div th:if="${error}" class="mt-6 rounded-3xl border border-rose-200 bg-rose-50 p-4 text-rose-700">
                <p th:text="${error}"></p>
            </div>

            <div class="mt-6 overflow-x-auto rounded-3xl border border-slate-200 bg-slate-50">
                <table class="min-w-full divide-y divide-slate-200 text-left text-sm">
                    <thead class="bg-slate-100 text-slate-700">
                    <tr>
                        <th class="px-6 py-4 font-medium">Nombre</th>
                        <th class="px-6 py-4 font-medium">Descripción</th>
                        <th class="px-6 py-4 font-medium">Acciones</th>
                    </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200 bg-white">
                    <tr th:each="categoria : ${categorias}">
                        <td class="px-6 py-4 text-slate-900" th:text="${categoria.nombre}"></td>
                        <td class="px-6 py-4 text-slate-600" th:text="${categoria.descripcion}"></td>
                        <td class="px-6 py-4">
                            <form th:action="@{/inventario/categorias/eliminar/{id}(id=${categoria.idCategoria})}" method="post" class="inline-block">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="inline-flex rounded-2xl bg-rose-600 px-3 py-2 text-xs font-semibold text-white transition hover:bg-rose-700" onclick="return confirm('¿Eliminar esta categoría?');">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td class="px-6 py-8 text-center text-slate-500" colspan="3">No hay categorías registradas.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
