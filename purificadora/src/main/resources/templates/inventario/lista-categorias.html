<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario | Categorías</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <th:block th:replace="~{fragments/csrf_fragment :: csrfMeta}"></th:block>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 via-indigo-50 to-purple-200 text-slate-700">
<div class="min-h-screen p-4 sm:p-6 lg:p-8">
    <div class="app-shell grid min-h-[calc(100vh-2rem)] gap-10 lg:gap-14 sm:min-h-[calc(100vh-3rem)] lg:min-h-[calc(100vh-4rem)]">
        <div th:insert="~{fragments/sidebar_fragment :: sidebarMenu}"></div>
        <div class="mx-auto w-full">
            <div class="grid gap-6 lg:grid-cols-[360px_1fr]">

                <!-- ===================== FORMULARIO NUEVA CATEGORÍA ===================== -->
                <div class="rounded-[2.5rem] bg-purple-50/90 backdrop-blur p-6 sm:p-8 clay-card">
                    <div class="mb-6">
                        <h1 class="text-xl sm:text-2xl font-extrabold text-indigo-900">Nueva Categoría</h1>
                        <p class="mt-2 text-sm font-medium text-indigo-400/80">Agrega una categoría para clasificar tus productos.</p>
                    </div>
                    <form th:action="@{/inventario/categorias}" method="post" th:object="${categoria}" class="grid gap-5">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div>
                            <label class="mb-2 ml-2 block text-xs font-bold uppercase tracking-wide text-indigo-400">Nombre</label>
                            <input th:field="*{nombre}" type="text" placeholder="Producto Terminado"
                                   class="w-full rounded-full bg-white px-5 py-3.5 text-sm font-medium text-indigo-900 placeholder-indigo-300 outline-none clay-input transition" />
                            <p th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="mt-1 ml-2 text-xs font-semibold text-rose-500"></p>
                        </div>
                        <div>
                            <label class="mb-2 ml-2 block text-xs font-bold uppercase tracking-wide text-indigo-400">Descripción</label>
                            <textarea th:field="*{descripcion}" rows="4" placeholder="Descripción de la categoría"
                                      class="w-full rounded-[1.75rem] bg-white px-5 py-4 text-sm font-medium text-indigo-900 placeholder-indigo-300 outline-none clay-input transition"></textarea>
                            <p th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}" class="mt-1 ml-2 text-xs font-semibold text-rose-500"></p>
                        </div>
                        <button type="submit" class="inline-flex items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 px-5 py-3.5 text-sm font-bold text-white transition clay-btn">Guardar categoría</button>
                    </form>
                </div>

                <!-- ===================== CATEGORÍAS EXISTENTES ===================== -->
                <div class="rounded-[2.5rem] bg-purple-50/90 backdrop-blur p-6 sm:p-8 clay-card">
                    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                        <div>
                            <h2 class="text-xl sm:text-2xl font-extrabold text-indigo-900">Categorías existentes</h2>
                            <p class="text-sm font-medium text-indigo-400/80">Edita y elimina categorías cuando sea necesario.</p>
                        </div>
                        <a th:href="@{/inventario/productos}" class="inline-flex items-center justify-center rounded-full bg-slate-900 px-5 py-3 text-sm font-bold text-white transition clay-btn-dark">Volver a productos</a>
                    </div>

                    <div th:if="${success}" class="mt-6 rounded-2xl bg-emerald-100/80 p-4 font-medium text-emerald-600 clay-alert">
                        <p th:text="${success}"></p>
                    </div>
                    <div th:if="${error}" class="mt-6 rounded-2xl bg-rose-100/80 p-4 font-medium text-rose-600 clay-alert">
                        <p th:text="${error}"></p>
                    </div>

                    <div class="mt-6 overflow-x-auto rounded-[2rem] bg-white p-2 clay-card-sm">
                        <table class="min-w-full divide-y divide-purple-100 text-left text-sm">
                            <thead class="text-indigo-400">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wide">Nombre</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wide">Descripción</th>
                                <th class="px-6 py-4 text-xs font-bold uppercase tracking-wide">Acciones</th>
                            </tr>
                            </thead>
                            <tbody class="divide-y divide-purple-50">
                            <tr th:each="categoria : ${categorias}" class="transition hover:bg-purple-50/60">
                                <td class="px-6 py-4 font-bold text-indigo-900" th:text="${categoria.nombre}"></td>
                                <td class="px-6 py-4 font-medium text-indigo-700" th:text="${categoria.descripcion}"></td>
                                <td class="px-6 py-4">
                                    <form th:action="@{/inventario/categorias/eliminar/{id}(id=${categoria.idCategoria})}" method="post" class="inline-block">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="inline-flex rounded-full bg-rose-500 px-4 py-2 text-xs font-bold text-white transition clay-btn-danger" onclick="return confirm('¿Eliminar esta categoría?');">Eliminar</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(categorias)}">
                                <td class="px-6 py-10 text-center text-sm font-medium text-indigo-300" colspan="3">No hay categorías registradas.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
