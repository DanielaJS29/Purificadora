<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario | Formulario de Producto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <th:block th:replace="~{fragments/csrf_fragment :: csrfMeta}"></th:block>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 via-indigo-50 to-purple-200 text-slate-700">

<div class="min-h-screen p-4 sm:p-6 lg:p-8">
    <div class="app-shell grid min-h-[calc(100vh-2rem)] gap-10 lg:gap-14 sm:min-h-[calc(100vh-3rem)] lg:min-h-[calc(100vh-4rem)]">

        <!-- Sidebar (fragmento externo, sin tocar su lógica) -->
        <div th:insert="~{fragments/sidebar_fragment :: sidebarMenu}"></div>

        <div class="mx-auto w-full">

            <!-- ===================== TARJETA PRINCIPAL ===================== -->
            <div class="rounded-[2.5rem] bg-purple-50/90 backdrop-blur p-6 sm:p-10 clay-card">

                <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <div class="flex items-center gap-4">
                        <div class="hidden sm:flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 clay-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="M3.3 7 12 12l8.7-5"/><path d="M12 22V12"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-extrabold text-indigo-900"
                                th:text="${producto.idProducto != null} ? 'Editar Producto' : 'Nuevo Producto'"></h1>
                            <p class="text-sm font-medium text-indigo-400/80">Completa los datos del producto para registrarlo en inventario.</p>
                        </div>
                    </div>
                    <a th:href="@{/inventario/productos}"
                       class="inline-flex items-center justify-center gap-2 rounded-full bg-white px-6 py-3 text-sm font-bold text-indigo-500 transition clay-btn-soft">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Regresar a productos
                    </a>
                </div>

                <!-- ===================== ALERTAS ===================== -->
                <div th:if="${success}" class="mt-8 rounded-[1.5rem] bg-emerald-50 p-5 clay-card-sm">
                    <div class="flex items-center gap-3">
                        <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-emerald-200/70 clay-chip">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-emerald-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                            </svg>
                        </div>
                        <p class="text-sm font-bold text-emerald-700" th:text="${success}"></p>
                    </div>
                </div>
                <div th:if="${error}" class="mt-8 rounded-[1.5rem] bg-rose-50 p-5 clay-card-sm">
                    <div class="flex items-center gap-3">
                        <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-rose-200/70 clay-chip">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-rose-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                            </svg>
                        </div>
                        <p class="text-sm font-bold text-rose-700" th:text="${error}"></p>
                    </div>
                </div>

                <!-- ===================== FORMULARIO ===================== -->
                <form th:action="@{/inventario/productos}" method="post" th:object="${producto}" class="mt-8 grid gap-6">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="rounded-[2rem] bg-white p-6 sm:p-8 clay-card-sm">
                        <div class="grid gap-6 sm:grid-cols-2">
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Nombre del producto</label>
                                <input th:field="*{nombre}" type="text" placeholder="Garrafón 20L Agua Purificada"
                                       class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" />
                                <p th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="mt-1 text-sm font-semibold text-rose-500"></p>
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Categoría</label>
                                <select th:field="*{categoria.idCategoria}"
                                        class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input">
                                    <option value="" disabled="disabled" th:selected="${producto.categoria == null}">Selecciona una categoría</option>
                                    <option th:each="categoria : ${categorias}"
                                            th:value="${categoria.idCategoria}"
                                            th:text="${categoria.nombre}"
                                            th:selected="${producto.categoria != null} ? ${categoria.idCategoria == producto.categoria.idCategoria} : false">
                                    </option>
                                </select>
                                <p th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}" class="mt-1 text-sm font-semibold text-rose-500"></p>
                            </div>
                        </div>

                        <div class="mt-6">
                            <label class="mb-2 block text-sm font-bold text-indigo-900">Descripción</label>
                            <textarea th:field="*{descripcion}" rows="4" placeholder="Descripción del producto"
                                      class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input"></textarea>
                            <p th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}" class="mt-1 text-sm font-semibold text-rose-500"></p>
                        </div>
                    </div>

                    <div class="rounded-[2rem] bg-white p-6 sm:p-8 clay-card-sm">
                        <div class="flex items-center gap-3">
                            <div class="flex h-11 w-11 items-center justify-center rounded-full bg-amber-100 clay-chip">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                                </svg>
                            </div>
                            <h2 class="text-lg font-bold text-indigo-900">Precios y unidad</h2>
                        </div>
                        <div class="mt-6 grid gap-6 sm:grid-cols-3">
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Precio de compra</label>
                                <input th:field="*{precioCompra}" type="number" step="0.01" min="0"
                                       class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" />
                                <p th:if="${#fields.hasErrors('precioCompra')}" th:errors="*{precioCompra}" class="mt-1 text-sm font-semibold text-rose-500"></p>
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Precio de venta</label>
                                <input th:field="*{precioVenta}" type="number" step="0.01" min="0"
                                       class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" />
                                <p th:if="${#fields.hasErrors('precioVenta')}" th:errors="*{precioVenta}" class="mt-1 text-sm font-semibold text-rose-500"></p>
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Unidad de medida</label>
                                <input th:field="*{unidadMedida}" type="text" placeholder="Piezas, Litros, Kilos"
                                       class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" />
                                <p th:if="${#fields.hasErrors('unidadMedida')}" th:errors="*{unidadMedida}" class="mt-1 text-sm font-semibold text-rose-500"></p>
                            </div>
                        </div>
                    </div>

                    <div class="rounded-[2rem] bg-white p-6 sm:p-8 clay-card-sm">
                        <div class="flex items-center gap-3">
                            <div class="flex h-11 w-11 items-center justify-center rounded-full bg-rose-100 clay-chip">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-rose-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/>
                                </svg>
                            </div>
                            <h2 class="text-lg font-bold text-indigo-900">Stock</h2>
                        </div>
                        <div class="mt-6 grid gap-6 sm:grid-cols-2">
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Stock actual</label>
                                <input th:field="*{stockActual}" type="number" min="0"
                                       class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" />
                                <p th:if="${#fields.hasErrors('stockActual')}" th:errors="*{stockActual}" class="mt-1 text-sm font-semibold text-rose-500"></p>
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900">Stock mínimo</label>
                                <input th:field="*{stockMinimo}" type="number" min="0"
                                       class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input" />
                                <p th:if="${#fields.hasErrors('stockMinimo')}" th:errors="*{stockMinimo}" class="mt-1 text-sm font-semibold text-rose-500"></p>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-end">
                        <a th:href="@{/inventario/productos}"
                           class="inline-flex items-center justify-center rounded-full bg-purple-50 px-6 py-3 text-sm font-bold text-indigo-500 transition clay-btn-soft">Cancelar</a>
                        <button type="submit"
                                class="inline-flex items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 px-6 py-3 text-sm font-bold text-white transition clay-btn">Guardar producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
