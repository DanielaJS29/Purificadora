<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario | Lista de Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <th:block th:insert="~{fragments/csrf_fragment :: csrfMeta}" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
<div class="min-h-screen">
    <div class="grid min-h-screen lg:grid-cols-[280px_1fr]">
        <div th:insert="~{fragments/sidebar_fragment :: sidebarMenu}"></div>
        <div class="mx-auto w-full px-4 py-8 sm:px-6 lg:px-8">
            <div class="flex flex-col gap-4 rounded-3xl bg-white p-6 shadow-xl shadow-slate-200">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <h1 class="text-3xl font-semibold text-sky-700">Gestión de Inventario</h1>
                <p class="mt-2 text-sm text-slate-500">Administra productos, visualiza stock crítico y mantén el inventario al día.</p>
            </div>
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
                <a href="/dashboard" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-100">Volver al dashboard</a>
                <a href="/inventario/productos/nuevo" class="inline-flex items-center justify-center rounded-2xl bg-sky-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-sky-700">Agregar Nuevo Producto</a>
                <a href="/inventario/categorias" class="inline-flex items-center justify-center rounded-2xl bg-slate-800 px-4 py-3 text-sm font-semibold text-white transition hover:bg-slate-900">Gestionar Categorías</a>
            </div>
        </div>

        <div class="grid gap-4 md:grid-cols-[1fr_auto] md:items-end">
            <form method="get" action="/inventario/productos" class="grid gap-3 sm:grid-cols-[1fr_auto]">
                <label class="sr-only" for="categoriaId">Filtrar por categoría</label>
                <select id="categoriaId" name="categoriaId" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-slate-900 outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100">
                    <option value="" th:text="'Todas las categorías'" th:selected="${categoriaId == null}"></option>
                    <option th:each="categoria : ${categorias}"
                            th:value="${categoria.idCategoria}"
                            th:text="${categoria.nombre}"
                            th:selected="${categoria.idCategoria == categoriaId}">
                    </option>
                </select>
                <button type="submit" class="inline-flex justify-center rounded-2xl bg-sky-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-sky-700">Filtrar</button>
            </form>
            <a href="/inventario/productos/criticos" class="inline-flex items-center justify-center rounded-2xl bg-rose-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-rose-700">Ver stock crítico</a>
        </div>

        <div class="overflow-x-auto rounded-3xl border border-slate-200 bg-slate-50">
            <table class="min-w-full divide-y divide-slate-200 text-left text-sm">
                <thead class="bg-slate-100 text-slate-700">
                <tr>
                    <th class="px-6 py-4 font-medium">Producto</th>
                    <th class="px-6 py-4 font-medium">Categoría</th>
                    <th class="px-6 py-4 font-medium">Precio Compra</th>
                    <th class="px-6 py-4 font-medium">Precio Venta</th>
                    <th class="px-6 py-4 font-medium">Stock</th>
                    <th class="px-6 py-4 font-medium">Unidad</th>
                    <th class="px-6 py-4 font-medium">Registrado</th>
                    <th class="px-6 py-4 font-medium">Acciones</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 bg-white">
                <tr th:each="producto : ${productos}">
                    <td class="px-6 py-4 text-slate-900">
                        <div class="font-semibold" th:text="${producto.nombre}"></div>
                        <div class="mt-1 text-xs text-slate-500" th:text="${producto.descripcion}"></div>
                    </td>
                    <td class="px-6 py-4 text-slate-800" th:text="${producto.categoria.nombre}"></td>
                    <td class="px-6 py-4 text-slate-800" th:text="${#numbers.formatDecimal(producto.precioCompra, 1, 'COMMA', 2, 'POINT')}"></td>
                    <td class="px-6 py-4 text-slate-800" th:text="${producto.precioVenta != null ? #numbers.formatDecimal(producto.precioVenta, 1, 'COMMA', 2, 'POINT') : '-'}"></td>
                    <td class="px-6 py-4">
                        <span th:classappend="${producto.stockActual <= producto.stockMinimo} ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'" class="inline-flex rounded-full px-3 py-1 text-xs font-semibold">
                            <span th:text="${producto.stockActual}"></span>
                            <span th:text="${producto.stockActual <= producto.stockMinimo} ? ' - Stock Bajo' : ' - Estable'"></span>
                        </span>
                    </td>
                    <td class="px-6 py-4 text-slate-800" th:text="${producto.unidadMedida}"></td>
                    <td class="px-6 py-4 text-slate-500" th:text="${#temporals.format(producto.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="px-6 py-4 space-x-2">
                        <a th:href="@{/inventario/productos/editar/{id}(id=${producto.idProducto})}"
                           class="inline-flex rounded-2xl bg-sky-600 px-3 py-2 text-xs font-semibold text-white transition hover:bg-sky-700">Editar</a>
                        <form th:action="@{/inventario/productos/eliminar/{id}(id=${producto.idProducto})}" method="post" class="inline-block">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="inline-flex rounded-2xl bg-rose-600 px-3 py-2 text-xs font-semibold text-white transition hover:bg-rose-700" onclick="return confirm('¿Eliminar este producto?');">Eliminar</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(productos)}">
                    <td class="px-6 py-8 text-center text-slate-500" colspan="8">No hay productos registrados.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
