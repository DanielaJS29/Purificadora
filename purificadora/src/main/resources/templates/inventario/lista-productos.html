<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario | Lista de Productos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <th:block th:replace="~{fragments/csrf_fragment :: csrfMeta}"></th:block>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 via-indigo-50 to-purple-200 text-slate-700">

<div class="min-h-screen p-4 sm:p-6 lg:p-8">
    <div class="app-shell grid min-h-[calc(100vh-2rem)] gap-10 lg:gap-14 sm:min-h-[calc(100vh-3rem)] lg:min-h-[calc(100vh-4rem)]">

        <!-- Sidebar (fragmento externo, sin tocar su lógica) -->
        <div th:insert="~{fragments/sidebar_fragment :: sidebarMenu}"></div>

        <div class="mx-auto w-full">

            <!-- ===================== TARJETA PRINCIPAL ===================== -->
            <div class="rounded-[2.5rem] bg-purple-50/90 backdrop-blur p-6 sm:p-10 clay-card">

                <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
                    <div class="flex items-center gap-4">
                        <div class="hidden sm:flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 clay-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="M3.3 7 12 12l8.7-5"/><path d="M12 22V12"/>
                            </svg>
                        </div>
                        <div>
                            <h1 class="text-2xl sm:text-3xl font-extrabold text-indigo-900">Gestión de Inventario</h1>
                            <p class="text-sm font-medium text-indigo-400/80">Administra productos, visualiza stock crítico y mantén el inventario al día.</p>
                        </div>
                    </div>
                    <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
                        <a th:href="@{/dashboard}"
                           class="inline-flex items-center justify-center gap-2 rounded-full bg-white px-5 py-3 text-sm font-bold text-indigo-500 transition clay-btn-soft">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                            Volver al dashboard
                        </a>
                        <a th:href="@{/inventario/productos/nuevo}"
                           class="inline-flex items-center justify-center gap-2 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 px-5 py-3 text-sm font-bold text-white transition clay-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Agregar Nuevo Producto
                        </a>
                        <a th:href="@{/inventario/categorias}"
                           class="inline-flex items-center justify-center gap-2 rounded-full bg-indigo-900 px-5 py-3 text-sm font-bold text-white transition clay-btn">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16v4H4z"/><path d="M4 12h16v8H4z"/>
                            </svg>
                            Gestionar Categorías
                        </a>
                    </div>
                </div>

                <!-- ===================== FILTROS ===================== -->
                <div class="mt-8 grid gap-4 rounded-[2rem] bg-white p-5 sm:p-6 clay-card-sm md:grid-cols-[1fr_auto] md:items-end">
                    <form method="get" th:action="@{/inventario/productos}" class="grid gap-3 sm:grid-cols-[1fr_auto]">
                        <div>
                            <label class="sr-only" for="categoriaId">Filtrar por categoría</label>
                            <select id="categoriaId" name="categoriaId"
                                    class="w-full rounded-2xl border-0 bg-purple-50/60 px-4 py-3 text-slate-700 outline-none transition clay-input">
                                <option value="" th:text="'Todas las categorías'" th:selected="${categoriaId == null}"></option>
                                <option th:each="categoria : ${categorias}"
                                        th:value="${categoria.idCategoria}"
                                        th:text="${categoria.nombre}"
                                        th:selected="${categoria.idCategoria == categoriaId}">
                                </option>
                            </select>
                        </div>
                        <button type="submit"
                                class="inline-flex items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 px-6 py-3 text-sm font-bold text-white transition clay-btn">Filtrar</button>
                    </form>
                    <a th:href="@{/inventario/productos/criticos}"
                       class="inline-flex items-center justify-center gap-2 rounded-full bg-rose-500 px-5 py-3 text-sm font-bold text-white transition clay-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                        Ver stock crítico
                    </a>
                </div>

                <!-- ===================== TABLA ===================== -->
                <div class="mt-6 overflow-x-auto rounded-[2rem] bg-white p-2 sm:p-3 clay-card-sm">
                    <table class="min-w-full border-separate text-left text-sm border-spaced-table">
                        <thead>
                        <tr class="text-xs font-bold uppercase tracking-wide text-indigo-400/80">
                            <th class="px-5 py-3">Producto</th>
                            <th class="px-5 py-3">Categoría</th>
                            <th class="px-5 py-3">Precio Compra</th>
                            <th class="px-5 py-3">Precio Venta</th>
                            <th class="px-5 py-3">Stock</th>
                            <th class="px-5 py-3">Unidad</th>
                            <th class="px-5 py-3">Registrado</th>
                            <th class="px-5 py-3">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="producto : ${productos}" class="rounded-2xl bg-purple-50/50 clay-row">
                            <td class="rounded-l-2xl px-5 py-4 text-indigo-900">
                                <div class="font-bold" th:text="${producto.nombre}"></div>
                                <div class="mt-1 text-xs font-medium text-indigo-400/80" th:text="${producto.descripcion}"></div>
                            </td>
                            <td class="px-5 py-4 font-medium text-slate-700" th:text="${producto.categoria.nombre}"></td>
                            <td class="px-5 py-4 font-medium text-slate-700" th:text="${#numbers.formatDecimal(producto.precioCompra, 1, 'COMMA', 2, 'POINT')}"></td>
                            <td class="px-5 py-4 font-medium text-slate-700" th:text="${producto.precioVenta != null ? #numbers.formatDecimal(producto.precioVenta, 1, 'COMMA', 2, 'POINT') : '-'}"></td>
                            <td class="px-5 py-4">
                                <span th:classappend="${producto.stockActual <= producto.stockMinimo} ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'" class="inline-flex items-center rounded-full px-3 py-1.5 text-xs font-bold clay-chip">
                                    <span th:text="${producto.stockActual}"></span>
                                    <span th:text="${producto.stockActual <= producto.stockMinimo} ? ' - Stock Bajo' : ' - Estable'"></span>
                                </span>
                            </td>
                            <td class="px-5 py-4 font-medium text-slate-700" th:text="${producto.unidadMedida}"></td>
                            <td class="px-5 py-4 font-medium text-indigo-400/80" th:text="${#temporals.format(producto.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="rounded-r-2xl px-5 py-4">
                                <div class="flex items-center gap-2">
                                    <a th:href="@{/inventario/productos/editar/{id}(id=${producto.idProducto})}"
                                       class="inline-flex items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 px-4 py-2 text-xs font-bold text-white transition clay-btn">Editar</a>
                                    <form th:action="@{/inventario/productos/eliminar/{id}(id=${producto.idProducto})}" method="post" class="inline-block">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit"
                                                class="inline-flex items-center justify-center rounded-full bg-rose-500 px-4 py-2 text-xs font-bold text-white transition clay-btn-danger"
                                                onclick="return confirm('¿Eliminar este producto?');">Eliminar</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(productos)}">
                            <td class="rounded-2xl px-5 py-10 text-center font-semibold text-indigo-400/80 clay-panel-inset" colspan="8">No hay productos registrados.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
